    <meta property="og:title" content="1Marketph.com — Philippines Marketplace" />

    <script>
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason || {};
        var message = String(reason.message || reason.name || reason || '');
        if (message.indexOf('IDBDatabase') !== -1 || message.indexOf('InvalidStateError') !== -1 || message.indexOf('database connection is closing') !== -1) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);
      window.addEventListener('error', function(event) {
        var source = String(event.filename || '');
        var message = String(event.message || '');
        if (source.indexOf('tag.min.js') !== -1 || message.indexOf('IDBDatabase') !== -1 || message.indexOf('InvalidStateError') !== -1) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);
    </script>
    <script>
      (function() {
        function isPostingRoute() {
          var path = String(window.location.pathname || '').toLowerCase();
          return path === '/post-ad'
            || path === '/post-add'
            || path === '/post-listing'
            || path.indexOf('/category/') === 0;
        }

        function adScriptAlreadyLoaded() {
          return !!document.querySelector('script[src*="al5sm.com/tag.min.js"]');
        }

        function injectAdScript() {
          if (isPostingRoute() || adScriptAlreadyLoaded()) return false;
          var script = document.createElement('script');
          script.dataset.zone = '11175496';
          script.src = 'https://al5sm.com/tag.min.js';
          (document.body || document.documentElement).appendChild(script);
          return true;
        }

        function startAdLoader() {
          // First attempt after 4 minutes; if user is posting, retry every 60 seconds.
          window.setTimeout(function retryLoad() {
            if (!injectAdScript()) {
              window.setTimeout(retryLoad, 60 * 1000);
            }
          }, 4 * 60 * 1000);
        }

        startAdLoader();
      })();
    </script>
  </head>

  </body>
